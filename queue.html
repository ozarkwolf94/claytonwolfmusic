<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Queue | The Den — Clayton Wolf</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; min-height: 100vh; }

        #viewport { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-image: url('Clayton Wolf Red Light Image Upscaled.png'); background-size: cover; background-position: center; }
        .radial-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0) 0%, rgba(220, 20, 60, 0.05) 25%, rgba(0, 0, 255, 0.08) 55%, rgba(0,0,0,1) 100%); backdrop-filter: blur(60px); z-index: 2; }
        #bokeh-canvas { position: absolute; top: 0; left: 0; mix-blend-mode: screen; z-index: 3; filter: blur(25px); opacity: 0.85; }
        .dark-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1; }

        .content { position: relative; z-index: 10; width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }

        .nav-row { width: 100%; max-width: 650px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }
        .back-btn { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 50px; color: #fff; text-decoration: none; transition: 0.3s; text-transform: uppercase; font-weight: 700; font-size: 0.8rem; display: inline-flex; align-items: center; justify-content: center; height: 40px; padding: 0 20px; border: 1px solid rgba(255, 255, 255, 0.2); letter-spacing: 2px; }
        .back-btn:hover { border-color: #dc143c; color: #dc143c; }
        .queue-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-end; flex: 1; }
        .queue-actions button, .queue-actions a.secondary {
            background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(220, 20, 60, 0.35); color: #ccc; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; padding: 8px 14px; border-radius: 8px; cursor: pointer; text-decoration: none; transition: 0.25s;
        }
        .queue-actions button:hover, .queue-actions a.secondary:hover { border-color: #DC143C; color: #fff; }

        h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.75rem; text-shadow: 0 0 25px rgba(220, 20, 60, 0.8); margin-bottom: 8px; letter-spacing: 2px; }
        .sub { color: #888; font-size: 0.85rem; margin-bottom: 28px; letter-spacing: 2px; text-transform: uppercase; }

        .queue-box { width: 100%; min-height: 420px; background: #000000; border-radius: 15px; padding: 40px 20px; border: 2px solid #DC143C; box-shadow: 0 0 25px rgba(220, 20, 60, 0.6); margin-bottom: 40px; max-width: 650px; }
        .queue-title { font-family: 'Orbitron'; color: #fff; font-size: 1.4rem; margin-bottom: 30px; letter-spacing: 3px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .live-dot { width: 10px; height: 10px; background: #DC143C; border-radius: 50%; box-shadow: 0 0 10px #DC143C; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #queue-list { display: flex; flex-direction: column; gap: 5px; text-align: left; }
        .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid rgba(220, 20, 60, 0.1); }
        .status-badge { color: #00FFFF; font-weight: 900; font-size: 0.7rem; border: 1px solid #00FFFF; padding: 4px 8px; border-radius: 4px; }

        .footer { color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="radial-mask"></div>
        <canvas id="bokeh-canvas"></canvas>
        <div class="dark-overlay"></div>
    </div>

    <div class="content">
        <div class="nav-row">
            <a href="index.html" class="back-btn">← Home</a>
            <div class="queue-actions">
                <a href="submit.html" class="secondary">Submit music</a>
                <button type="button" id="btn-popout" title="Opens this queue in a smaller window">Pop out window</button>
            </div>
        </div>

        <h1>LIVE QUEUE</h1>
        <p class="sub">The Den — claytonwolfmusic.com</p>

        <div class="queue-box">
            <div class="queue-title"><span class="live-dot"></span> NOW PLAYING ORDER</div>
            <div id="queue-list">Scanning the den...</div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Clayton Wolf - WolfPro Services LLC.</p>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbyULd_-cC4SoS8kkrhMU-wfSt0o-RMkIrmsTIOkFGKbWuwcu8oMNzbWr7M4q4D7JX1s/exec';

        (function () {
            var btn = document.getElementById('btn-popout');
            if (window.name === 'DenLiveQueue') {
                btn.style.display = 'none';
                return;
            }
            btn.addEventListener('click', function () {
                var w = 480, h = 780;
                var y = window.top.outerHeight / 2 + window.top.screenY - (h / 2);
                var x = window.top.outerWidth / 2 + window.top.screenX - (w / 2);
                window.open('queue.html', 'DenLiveQueue', 'width=' + w + ',height=' + h + ',left=' + x + ',top=' + y + ',scrollbars=yes,resizable=yes');
            });
        })();

        async function loadQueue() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const active = data.filter(function (i) { return String(i.Archive).toUpperCase() !== 'TRUE'; });
                document.getElementById('queue-list').innerHTML = active.length === 0 ?
                    "<div style='color:#444; text-align:center; margin-top:50px;'>The den is quiet...</div>" :
                    active.map(function (i, index) {
                        var isBoosted = i.Status && i.Status.indexOf('VERIFYING') !== -1;
                        var statusColor = isBoosted ? '#FFD700' : '#00FFFF';
                        return '<div class="queue-item"><div class="track-info"><span style="color:#DC143C; margin-right:15px;">#' + (index + 1) + '</span><div><strong style="color:' + (isBoosted ? '#FFD700' : '#fff') + ';">' + i['Artist Name'] + '</strong><br><small style="color:#888;">' + i['Track Title'] + '</small></div></div><div class="status-badge" style="border-color:' + statusColor + '; color:' + statusColor + ';">' + i['Status'] + '</div></div>';
                    }).join('');
            } catch (err) {}
        }

        var canvas = document.getElementById('bokeh-canvas');
        var ctx = canvas.getContext('2d');
        var particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        function Particle() { this.init(); }
        Particle.prototype.init = function () { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 45 + 15; this.alpha = Math.random() * 0.12 + 0.05; this.color = ['#FF0000', '#00FFFF', '#8A2BE2'][Math.floor(Math.random() * 3)]; this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4; };
        Particle.prototype.draw = function () { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.globalAlpha = this.alpha; ctx.fill(); };
        Particle.prototype.update = function () { this.x += this.vx; this.y += this.vy; if (this.x > canvas.width + 100) this.x = -100; if (this.y > canvas.height + 100) this.y = -100; };
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); if (particles.length < 40) for (var i = 0; i < 40; i++) particles.push(new Particle()); particles.forEach(function (p) { p.update(); p.draw(); }); requestAnimationFrame(animate); }

        setInterval(loadQueue, 10000);
        loadQueue();
        animate();
    </script>
</body>
</html>
